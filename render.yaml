# Blueprint di deploy per Render (https://render.com).
# Pubblica il backend FastAPI. Il database e su Supabase (PostgreSQL):
# imposta DATABASE_URL con la stringa di connessione del pooler Supabase.
services:
  - type: web
    name: monitor-spese-api
    runtime: python
    plan: free
    region: frankfurt          # stessa regione di Supabase (bassa latenza)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false            # da inserire manualmente (segreto)
      - key: MONITOR_SPESE_COOKIE_SECURE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12"
